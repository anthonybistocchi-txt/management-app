# MySQL (imagem oficial): MYSQL_USER não pode ser "root". Use um usuário dedicado (ex.: laravel) em COMPOSE_DB_*.
# Root do servidor MySQL continua só via MYSQL_ROOT_PASSWORD (COMPOSE_MYSQL_ROOT_PASSWORD).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${COMPOSE_DB_DATABASE:-laravel}
      DB_USERNAME: ${COMPOSE_DB_USERNAME:-laravel}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-laravel}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laravel

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${COMPOSE_DB_DATABASE:-laravel}
      MYSQL_USER: ${COMPOSE_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD:-laravel}
      MYSQL_ROOT_PASSWORD: ${COMPOSE_MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - laravel

  node:
    image: node:20-bookworm
    profiles: [assets]
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: ["sh", "/var/www/html/docker/npm-assets.sh"]

networks:
  laravel:
    driver: bridge

volumes:
  mysql-data:
